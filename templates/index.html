<!DOCTYPE html>
<html>
<head>
    <title>AI Exam Generator</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #2f2f2f; /* dark grey */
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center; /* center horizontally */
            align-items: center;     /* center vertically */
            height: 100vh;
        }

        .container {
            width: 600px;
            background: #ffffff;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            text-align: center; /* center text inside */
        }

        h1 {
            margin-bottom: 20px;
        }

        textarea {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        select {
            margin-top: 10px;
            padding: 8px;
            border-radius: 6px;
        }

        button {
            margin-top: 15px;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            background-color: #4CAF50;
            color: white;
            font-size: 14px;
            cursor: pointer;
        }

        button:hover {
            background-color: #45a049;
        }

        .questions {
            margin-top: 20px;
            text-align: left; /* keep questions readable */
        }

    </style>
</head>
<body>

<div class="container">
    <img src="{{ url_for('static', filename='brainbolt.png') }}" width="120">
    <h1>AI Exam Generator</h1>

    <form method="POST">
        <textarea name="notes" rows="5" placeholder="Enter your study notes..."></textarea>

        <br>

        <select name="difficulty">
            <option value="easy">Easy</option>
            <option value="medium">Medium</option>
            <option value="hard">Hard</option>
        </select>

        <br>

        <button type="submit">Generate Questions</button>
    </form>

    {% if questions %}
    <div class="questions">
        <h3>Generated Questions:</h3>
        <ol>
            {% for q in questions %}
                <li>{{ q }}</li>
            {% endfor %}
        </ol>
    </div>
    {% endif %}
</div>

</body>
</html>
