<!DOCTYPE html>
<html>
<head>
    <title>AI Study App (Demo)</title>
</head>
<body>

<h1>AI Study App (UI Demo)</h1>

<form method="POST">
    <textarea name="notes" rows="6" cols="60" placeholder="Enter study notes..."></textarea>
    <br><br>
    <button type="submit">Generate</button>
</form>

<hr>

{% if question %}
<h2>Question:</h2>
<p>{{ question }}</p>
{% endif %}

{% if feedback %}
<h3>{{ feedback }}</h3>
{% endif %}

</body>
</html>
